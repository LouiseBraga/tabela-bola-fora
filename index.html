<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Bola Fora</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-topo">
            <img src="escudo.PNG" alt="Escudo Bola Fora" class="logo-escudo">
            <h1>TABELA<br>BOLA FORA</h1>
        </div>
        
        <nav class="menu">
            <button onclick="mudarAba('elenco')" id="btn-elenco" class="ativo">Elenco & Times</button>
            <button onclick="mudarAba('grupos')" id="btn-grupos">Fase de Grupos</button>
            <button onclick="mudarAba('classificacao')" id="btn-classificacao">Classificação</button>
            <button onclick="mudarAba('finais')" id="btn-finais">Finais</button>
        </nav>
        
        <div style="margin-top: 15px;">
            <button onclick="resetarTorneio()" class="btn-reset">🔄 Iniciar Novo Torneio</button>
        </div>
    </header>

    <main id="app-container">
        <section id="elenco" class="aba ativa">
            
            <div class="card-cadastro">
                <h3 style="color: var(--azul-oficial); margin-bottom: 10px;">1. Cadastrar Novo Jogador</h3>
                <div class="linha-inputs">
                    <input type="text" id="novo-nome" placeholder="Nome do Jogador..." maxlength="20">
                    <select id="novo-tipo">
                        <option value="mensalista">Mensalista ⭐️</option>
                        <option value="diarista">Diarista 🏐</option>
                    </select>
                    <button class="btn-salvar" onclick="adicionarJogador()">Salvar no Sistema</button>
                </div>
            </div>

            <div class="card-cadastro">
                <h3 style="color: var(--azul-oficial); margin-bottom: 10px;">2. Escalação dos times</h3>
                <div class="linha-inputs">
                    <input type="text" id="busca-jogador-input" list="lista-jogadores-disponiveis" placeholder="Digitar nome do jogador..." autocomplete="off">
                    <datalist id="lista-jogadores-disponiveis"></datalist>
                    
                    <select id="escolha-time">
                        <option value="Amarelo">Time Amarelo</option>
                        <option value="Rosa">Time Rosa</option>
                        <option value="Azul">Time Azul</option>
                        <option value="Roxo">Time Roxo</option>
                    </select>
                    <button class="btn-salvar" onclick="escalarJogador()">Escalar Jogador</button>
                </div>
            </div>

            <div class="montagem-times">
                <h3 style="color: var(--azul-oficial); margin-bottom: 15px; text-align: center; margin-top: 20px;">Times Formados</h3>
                <div id="times-formados" class="grid-times"></div>
            </div>

            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc;">
                <h4 style="color: #666; cursor: pointer; text-align: center;" onclick="document.getElementById('tabela-geral-container').classList.toggle('escondido')">
                    👀 Mostrar/Ocultar Todos os Jogadores Cadastrados
                </h4>
                <div id="tabela-geral-container" class="escondido" style="margin-top: 15px;">
                    <table class="tabela-classificacao" style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Tipo</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela-elenco"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="grupos" class="aba">
            <h2>Jogos da Fase de Grupos</h2>
            <div id="lista-jogos"></div>
        </section>

        <section id="classificacao" class="aba">
            <h2>Tabela de Classificação</h2>
            <table id="tabela-classificacao">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Time</th>
                        <th>Vitórias</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                </tbody>
            </table>
        </section>

        <section id="finais" class="aba">
            <h2>Fase Final</h2>
            <div id="mata-mata">
                <p>As finais serão liberadas após o término da fase de grupos.</p>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
