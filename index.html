<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Bola Fora</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-topo">
            <img src="escudo.PNG" alt="Escudo Bola Fora" class="logo-escudo">
            <h1>TABELA<br>BOLA FORA</h1>
        </div>
        
        <nav class="menu">
            <!-- Botão Novo de Elenco (Definido como ativo) -->
            <button onclick="mudarAba('elenco')" id="btn-elenco" class="ativo">Elenco & Times</button>
            <button onclick="mudarAba('grupos')" id="btn-grupos">Fase de Grupos</button>
            <button onclick="mudarAba('classificacao')" id="btn-classificacao">Classificação</button>
            <button onclick="mudarAba('finais')" id="btn-finais">Finais</button>
        </nav>
        
        <div style="margin-top: 15px;">
            <button onclick="resetarTorneio()" class="btn-reset">🔄 Iniciar Novo Torneio</button>
        </div>
    </header>

    <main id="app-container">
        <!-- NOVA ABA: GESTÃO DE JOGADORES (Definida como ativa) -->
        <section id="elenco" class="aba ativa">
            <h2 style="text-align: center; color: var(--azul-oficial); margin-bottom: 15px;">Gestão de Jogadores</h2>
            
            <div class="card-cadastro">
                <input type="text" id="novo-nome" placeholder="Nome do Jogador..." maxlength="20">
                <select id="novo-tipo">
                    <option value="mensalista">Mensalista ⭐️</option>
                    <option value="diarista">Diarista 🏐</option>
                </select>
                <button class="btn-salvar" onclick="adicionarJogador()" style="margin-top: 10px;">Adicionar à Lista</button>
            </div>

            <div class="grid-elenco">
                <div class="lista-geral">
                    <h3 style="color: var(--azul-oficial); margin-bottom: 10px;">Lista Geral (Marque a Presença)</h3>
                    <div id="lista-jogadores-cadastrados"></div>
                </div>

                <div class="montagem-times">
                    <h3 style="color: var(--azul-oficial); margin-bottom: 10px;">Montar Times (Presentes)</h3>
                    <div id="times-formados"></div>
                </div>
            </div>
        </section>

        <!-- ABA DOS GRUPOS (Perdeu a classe 'ativa' para não sobrepor a do elenco) -->
        <section id="grupos" class="aba">
            <h2>Jogos da Fase de Grupos</h2>
            <div id="lista-jogos"></div>
        </section>

        <section id="classificacao" class="aba">
            <h2>Tabela de Classificação</h2>
            <table id="tabela-classificacao">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Time</th>
                        <th>Vitórias</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                </tbody>
            </table>
        </section>

        <section id="finais" class="aba">
            <h2>Fase Final</h2>
            <div id="mata-mata">
                <p>As finais serão liberadas após o término da fase de grupos.</p>
            </div>
        </section>
    </main>

    <!-- Container Invisível para os Avisos do Sistema (Toasts) -->
    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
